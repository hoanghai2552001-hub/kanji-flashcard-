<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="漢字">
<meta name="theme-color" content="#0d0d0d">
<title>漢字 Flashcard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --correct: #10b981; --incorrect: #f43f5e;
    --bg: #0d0d0d; --card-bg: #141414;
    --accent: #818cf8; --accent2: #f472b6;
    --text: #f1f5f9; --muted: #6b7280; --radius: 20px;
    /* Dynamic safe area for notch/home bar */
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px);
    --sar: env(safe-area-inset-right, 0px);
  }
  html { height: 100%; height: -webkit-fill-available; }
  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: -webkit-fill-available;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: pan-x pan-y;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 60%, rgba(129,140,248,.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 85% 25%, rgba(244,114,182,.1) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── HEADER ── */
  #header {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(10px + var(--sat)) 18px 10px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    background: rgba(15,15,26,.85);
    border-bottom: 1px solid rgba(255,255,255,.07); z-index: 20; gap: 8px;
  }
  #header h1 { font-size: 1rem; font-weight: 800; color: var(--accent2); white-space: nowrap; }
  #progress-text { font-size: .88rem; color: var(--muted); }
  #score-display { font-size: .85rem; display: flex; gap: 12px; }
  .score-correct { color: var(--correct); font-weight: 700; }
  .score-incorrect { color: var(--incorrect); font-weight: 700; }

  /* ── MODE BAR ── */
  #mode-bar {
    position: fixed; top: var(--header-h, 52px); left: 0; right: 0; z-index: 19;
    display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap;
    padding: 8px 14px;
    background: rgba(15,15,26,.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,.05);
  }
  #timer-select-wrap { display: none; align-items: center; gap: 6px; }
  #timer-select-wrap span { font-size: .75rem; color: #fca5a5; }
  .timer-btn {
    border: 1px solid rgba(239,68,68,.3); background: rgba(239,68,68,.08);
    color: #fca5a5; border-radius: 50px; font-size: .75rem; font-weight: 700;
    padding: 6px 14px; cursor: pointer; transition: all .2s;
    min-height: 36px; /* touch target */
  }
  .timer-btn.active-timer { background: #7f1d1d; border-color: var(--incorrect); color: #fff; }
  .mode-btn {
    border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.06);
    color: var(--muted); border-radius: 50px; font-size: .82rem;
    font-weight: 700; padding: 7px 20px; cursor: pointer; transition: all .2s;
    min-height: 38px;
  }
  .mode-btn.active-easy { background: #166534; color: #86efac; border-color: var(--correct); }
  .mode-btn.active-hard { background: #7f1d1d; color: #fca5a5; border-color: var(--incorrect); }

  /* ── LEVEL FILTER ── */
  #level-filter {
    position: fixed; top: var(--modebar-bottom, 100px); left: 0; right: 0; z-index: 18;
    display: flex; gap: 6px; justify-content: center; padding: 6px 12px;
    background: rgba(15,15,26,.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,.04);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #level-filter::-webkit-scrollbar { display: none; }
  .lvl-btn {
    border: 1px solid rgba(255,255,255,.13); background: rgba(255,255,255,.05);
    color: var(--muted); border-radius: 50px; font-size: .78rem;
    font-weight: 700; padding: 6px 16px; cursor: pointer; transition: all .2s;
    white-space: nowrap; min-height: 36px; flex-shrink: 0;
  }
  .lvl-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── TIMER / PROGRESS BARS ── */
  #timer-wrap {
    position: fixed; top: var(--levelbar-bottom, 136px); left: 0; right: 0; height: 5px;
    background: rgba(255,255,255,.08); z-index: 17; display: none;
  }
  #timer-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #ef4444, #f59e0b); transform-origin: left; }
  #progress-bar-wrap { position: fixed; top: var(--levelbar-bottom, 136px); left: 0; right: 0; height: 4px; background: rgba(255,255,255,.08); z-index: 17; }
  #progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .4s; border-radius: 2px; }

  /* ── INSTRUCTION ── */
  #instruction {
    position: fixed; top: calc(var(--levelbar-bottom, 136px) + 10px); left: 50%; transform: translateX(-50%);
    border-radius: 50px; padding: 5px 16px; font-size: .76rem;
    white-space: nowrap; z-index: 16; pointer-events: none; transition: all .3s;
  }
  #instruction.easy-inst { background: rgba(124,58,237,.2); border: 1px solid rgba(124,58,237,.4); color: var(--accent2); }
  #instruction.hard-inst { background: rgba(239,68,68,.2); border: 1px solid rgba(239,68,68,.4); color: #fca5a5; }
  #streak-badge { position: fixed; top: calc(var(--levelbar-bottom, 136px) + 10px); right: 16px; font-size: .85rem; font-weight: 800; color: #fb923c; z-index: 16; display: none; }

  /* ── CARD ── */
  #card-wrap {
    perspective: 1200px;
    width: min(440px, 94vw);
    height: min(460px, 56vh);
    margin-top: 30px;
  }
  #card {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d;
    transition: transform .45s cubic-bezier(.4,0,.2,1);
    border-radius: var(--radius); cursor: pointer;
  }
  #card.flipped { transform: rotateY(180deg); }
  #card.flash-correct  { animation: fC .4s ease; }
  #card.flash-incorrect { animation: fI .4s ease; }
  @keyframes fC { 0%{box-shadow:0 20px 50px rgba(0,0,0,.5)} 35%{box-shadow:0 0 0 6px var(--correct),0 20px 50px rgba(34,197,94,.4);transform:scale(1.03)} 100%{box-shadow:0 20px 50px rgba(0,0,0,.5)} }
  @keyframes fI { 0%{box-shadow:0 20px 50px rgba(0,0,0,.5)} 35%{box-shadow:0 0 0 6px var(--incorrect),0 20px 50px rgba(239,68,68,.4);transform:scale(.97)} 100%{box-shadow:0 20px 50px rgba(0,0,0,.5)} }
  .card-face {
    position: absolute; inset: 0; border-radius: var(--radius);
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    display: flex; flex-direction: column; overflow: hidden;
    border: 1px solid rgba(255,255,255,.08); box-shadow: 0 20px 50px rgba(0,0,0,.5);
  }
  #card-front { background: var(--card-bg); }
  #kanji-area {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(145deg, #1e1e2e, #2d1b69);
    border-bottom: 3px solid var(--accent); position: relative; gap: 6px;
  }
  #kanji-area.hard-glow { border-bottom-color: var(--incorrect); }
  #kanji-area::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(124,58,237,.15), transparent 70%); }
  #kanji { font-size: clamp(5rem, 22vw, 8rem); line-height: 1; font-weight: 900; color: #fff; text-shadow: 0 0 40px rgba(124,58,237,.8), 0 0 80px rgba(245,158,11,.3); position: relative; z-index: 1; }
  #han-viet { font-size: 1rem; color: var(--accent2); font-weight: 700; letter-spacing: .12em; position: relative; z-index: 1; }
  #meaning-area { padding: 14px 16px 10px; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: opacity .3s; }
  #meaning-area.hidden { opacity: 0; pointer-events: none; }
  #shown-meaning { font-size: clamp(1rem, 4vw, 1.25rem); font-weight: 700; text-align: center; color: var(--text); }
  #reading-on  { font-size: .82rem; color: #a78bfa; }
  #reading-kun { font-size: .82rem; color: #67e8f9; }
  #verdict-badge { display: none; padding: 4px 14px; border-radius: 50px; font-size: .78rem; font-weight: 700; margin-top: 2px; }
  #verdict-badge.cb { background:rgba(34,197,94,.2); color:var(--correct); border:1px solid var(--correct); display:inline-block; }
  #verdict-badge.wb { background:rgba(239,68,68,.2); color:var(--incorrect); border:1px solid var(--incorrect); display:inline-block; }
  #verdict-hint { font-size: .72rem; color: var(--muted); }
  #hard-reading { display: none; font-size: .9rem; color: #cbd5e1; position: relative; z-index: 1; text-align: center; line-height: 1.6; margin-top: 4px; }
  #card-back {
    background: linear-gradient(145deg, #1a1a2e, #16213e);
    transform: rotateY(180deg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 10px; padding: 24px; text-align: center;
  }
  #back-kanji { font-size: 3.5rem; opacity: .12; }
  #back-content { font-size: .92rem; line-height: 1.9; color: var(--muted); }
  #back-content strong { color: var(--text); }
  .correct-meaning { color: var(--correct); font-weight: 700; }

  /* ── FEEDBACK ── */
  #feedback { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; font-size: 7rem; pointer-events: none; opacity: 0; }
  #feedback.show { animation: fbPop .4s ease forwards; }
  @keyframes fbPop { 0%{opacity:0;transform:scale(.5)} 40%{opacity:1;transform:scale(1.2)} 100%{opacity:0;transform:scale(1)} }

  /* ── SWIPE HINT (mobile only) ── */
  #swipe-hint {
    position: fixed; bottom: calc(var(--controls-h, 80px) + 10px); left: 50%;
    transform: translateX(-50%);
    font-size: .68rem; color: rgba(255,255,255,.2);
    pointer-events: none; z-index: 15; white-space: nowrap;
    letter-spacing: .05em;
  }

  /* ── CONTROLS ── */
  #controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 12px 16px calc(12px + var(--sab));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    background: rgba(15,15,26,.9); border-top: 1px solid rgba(255,255,255,.07);
  }
  .btn {
    border: none; cursor: pointer; border-radius: 50px;
    font-size: .82rem; font-weight: 700; letter-spacing: .04em;
    padding: 13px 20px; transition: all .15s; text-transform: uppercase;
    min-height: 48px; /* WCAG touch target */
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #btn-correct   { background: linear-gradient(135deg,#166534,var(--correct)); color:#fff; box-shadow:0 4px 18px rgba(34,197,94,.3); flex: 1; max-width: 120px; }
  #btn-incorrect { background: linear-gradient(135deg,#991b1b,var(--incorrect)); color:#fff; box-shadow:0 4px 18px rgba(239,68,68,.3); flex: 1; max-width: 120px; }
  #btn-flip  { background: linear-gradient(135deg,var(--accent),#4f46e5); color:#fff; flex: 1; max-width: 100px; }
  #btn-shuffle { background:rgba(255,255,255,.08); color:var(--muted); border:1px solid rgba(255,255,255,.12); padding: 13px 14px; }
  .btn-wrap { display:flex; flex: 1; max-width: 120px; }
  .btn-wrap .btn { width: 100%; }
  .key-hint { display: none; } /* hidden on mobile */

  /* ── MODAL ── */
  #modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
  #modal-overlay.visible { display: flex; }
  #modal { background: #1e1e2e; border-radius: 28px; border: 1px solid rgba(255,255,255,.1); padding: 36px 28px; text-align: center; max-width: 360px; width: 100%; box-shadow: 0 30px 80px rgba(0,0,0,.7); display: flex; flex-direction: column; gap: 14px; }
  #modal-emoji { font-size: 3.5rem; }
  #modal-title { font-size: 1.6rem; font-weight: 900; }
  #modal-streak { font-size: 3.2rem; font-weight: 900; background: linear-gradient(135deg, var(--correct), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #modal-detail { font-size: .95rem; color: var(--muted); line-height: 1.6; }
  #modal-btn { background: linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; padding:15px 32px; font-size:.95rem; margin-top: 4px; min-height: 52px; }

  /* ── DONE SCREEN ── */
  #done-screen { display:none; position:fixed; inset:0; z-index:100; background:var(--bg); flex-direction:column; align-items:center; justify-content:center; gap:16px; text-align:center; padding:32px; }
  #done-screen.visible { display:flex; }
  #done-screen h2 { font-size:2.2rem; font-weight:900; }
  .big-score { font-size:3.5rem; font-weight:900; background:linear-gradient(135deg,var(--correct),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  #done-screen p { color:var(--muted); font-size:1rem; }
  #btn-restart { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; padding:16px 40px; font-size:1rem; min-height: 52px; }

  /* ── ACTIVE STATES (replaces hover for touch) ── */
  .btn:active { transform: scale(.95); opacity: .85; }
  .lvl-btn:active, .mode-btn:active, .timer-btn:active { opacity: .7; }
</style>
</head>
<body>

<div id="header">
  <h1>漢字 Flashcard</h1>
  <span id="progress-text">1 / ?</span>
  <div id="score-display">
    <span class="score-correct">✓ <span id="s-correct">0</span></span>
    <span class="score-incorrect">✗ <span id="s-incorrect">0</span></span>
  </div>
</div>

<div id="mode-bar">
  <button class="mode-btn active-easy" data-mode="easy">🟢 Easy</button>
  <button class="mode-btn" data-mode="hard">🔴 Hard</button>
  <div id="timer-select-wrap">
    <span>⏱</span>
    <button class="timer-btn" data-sec="3">3s</button>
    <button class="timer-btn active-timer" data-sec="6">6s</button>
    <button class="timer-btn" data-sec="8">8s</button>
  </div>
</div>

<div id="level-filter">
  <button class="lvl-btn active" data-lvl="ALL">Tất cả</button>
  <button class="lvl-btn" data-lvl="N5">N5</button>
  <button class="lvl-btn" data-lvl="N4">N4</button>
  <button class="lvl-btn" data-lvl="N3">N3</button>
  <button class="lvl-btn" data-lvl="N2">N2</button>
  <button class="lvl-btn" data-lvl="N1">N1</button>
</div>

<div id="timer-wrap"><div id="timer-bar"></div></div>
<div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
<div id="instruction" class="easy-inst">← Đúng &nbsp;|&nbsp; Nghĩa hiển thị là đúng hay sai? &nbsp;|&nbsp; Sai →</div>
<div id="streak-badge">🔥 0</div>
<div id="feedback"></div>

<div id="card-wrap">
  <div id="card">
    <div class="card-face" id="card-front">
      <div id="kanji-area">
        <div id="kanji">漢</div>
        <div id="han-viet">HÁN</div>
        <div id="hard-reading"></div>
      </div>
      <div id="meaning-area">
        <div id="shown-meaning">chữ hán</div>
        <div id="reading-on">On: カン</div>
        <div id="reading-kun">Kun: —</div>
        <div id="verdict-badge"></div>
        <div id="verdict-hint">Nghĩa hiển thị là đúng hay sai?</div>
      </div>
    </div>
    <div class="card-face" id="card-back">
      <div id="back-kanji">漢</div>
      <div id="back-content"></div>
    </div>
  </div>
</div>

<div id="swipe-hint">← vuốt đúng &nbsp;·&nbsp; chạm lật &nbsp;·&nbsp; vuốt sai →</div>

<div id="controls">
  <div class="btn-wrap"><button class="btn" id="btn-correct">✓ Đúng</button></div>
  <div class="btn-wrap"><button class="btn" id="btn-flip">↩ Lật</button></div>
  <div class="btn-wrap"><button class="btn" id="btn-incorrect">✗ Sai</button></div>
  <button class="btn" id="btn-shuffle">⇄</button>
</div>

<div id="modal-overlay">
  <div id="modal">
    <div id="modal-emoji">💥</div>
    <div id="modal-title"></div>
    <div id="modal-streak">0</div>
    <div id="modal-detail"></div>
    <button class="btn" id="modal-btn">↺ Thử lại</button>
  </div>
</div>

<div id="done-screen">
  <h2>🎉 Hoàn thành!</h2>
  <div class="big-score" id="final-pct">0%</div>
  <p id="final-detail"></p>
  <button class="btn" id="btn-restart">↺ Học lại</button>
</div>

<script>
// ══════════════════════════════════════════
// FULL KANJI DATA — N5 + N4 + N3 + N2 (AhoVN)
// ══════════════════════════════════════════
const ALL_KANJI = [
// ===== N5 =====
{kanji:"安",hanviet:"AN",on:"あん",kun:"やす（い）",meaning:"bình an, an toàn, rẻ",level:"N5"},
{kanji:"一",hanviet:"NHẤT",on:"いち、いつ",kun:"ひと（つ）",meaning:"một",level:"N5"},
{kanji:"飲",hanviet:"ẨM",on:"いん",kun:"の（む）",meaning:"uống",level:"N5"},
{kanji:"右",hanviet:"HỮU",on:"う、ゆ",kun:"みぎ",meaning:"bên phải",level:"N5"},
{kanji:"雨",hanviet:"VŨ",on:"う",kun:"あめ",meaning:"mưa",level:"N5"},
{kanji:"駅",hanviet:"DỊCH",on:"えき",kun:"—",meaning:"nhà ga",level:"N5"},
{kanji:"円",hanviet:"VIÊN",on:"えん",kun:"まる（い）",meaning:"đồng yên, tròn",level:"N5"},
{kanji:"火",hanviet:"HỎA",on:"か",kun:"ひ",meaning:"lửa",level:"N5"},
{kanji:"花",hanviet:"HOA",on:"か",kun:"はな",meaning:"hoa",level:"N5"},
{kanji:"下",hanviet:"HẠ",on:"か、げ",kun:"した",meaning:"dưới, phía dưới",level:"N5"},
{kanji:"何",hanviet:"HÀ",on:"か",kun:"なに、なん",meaning:"cái gì, cái nào",level:"N5"},
{kanji:"会",hanviet:"HỘI",on:"かい、え",kun:"あ（う）",meaning:"gặp gỡ, hội họp",level:"N5"},
{kanji:"話",hanviet:"THOẠI",on:"わ",kun:"はなし、はな（す）",meaning:"nói chuyện",level:"N5"},
{kanji:"六",hanviet:"LỤC",on:"ろく",kun:"む（つ）",meaning:"sáu",level:"N5"},
{kanji:"立",hanviet:"LẬP",on:"りつ",kun:"た（つ）",meaning:"đứng, thiết lập",level:"N5"},
{kanji:"来",hanviet:"LAI",on:"らい",kun:"く（る）",meaning:"đến, tới",level:"N5"},
{kanji:"友",hanviet:"HỮU",on:"ゆう",kun:"とも",meaning:"bạn",level:"N5"},
{kanji:"目",hanviet:"MỤC",on:"もく",kun:"め",meaning:"mắt",level:"N5"},
{kanji:"名",hanviet:"DANH",on:"めい、みょう",kun:"な",meaning:"danh, tên",level:"N5"},
{kanji:"万",hanviet:"VẠN",on:"まん、ばん",kun:"—",meaning:"vạn (mười ngàn)",level:"N5"},
{kanji:"毎",hanviet:"MỖI",on:"まい",kun:"—",meaning:"mỗi, mọi",level:"N5"},
{kanji:"本",hanviet:"BẢN",on:"ほん",kun:"もと",meaning:"sách, nguồn gốc",level:"N5"},
{kanji:"木",hanviet:"MỘC",on:"ぼく、もく",kun:"き、こ",meaning:"cây, gỗ",level:"N5"},
{kanji:"北",hanviet:"BẮC",on:"ほく",kun:"きた",meaning:"phía bắc",level:"N5"},
{kanji:"母",hanviet:"MẪU",on:"ぼ",kun:"はは",meaning:"mẹ",level:"N5"},
{kanji:"聞",hanviet:"VĂN",on:"ぶん、もん",kun:"き（く）",meaning:"nghe, hỏi",level:"N5"},
{kanji:"分",hanviet:"PHÂN",on:"ぶん、ぶ、ふん",kun:"わか（る）",meaning:"phút, phân chia, hiểu",level:"N5"},
{kanji:"父",hanviet:"PHỤ",on:"ふ",kun:"ちち",meaning:"bố",level:"N5"},
{kanji:"百",hanviet:"BÁCH",on:"ひゃく",kun:"—",meaning:"trăm",level:"N5"},

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let deck = [], idx = 0, correct = 0, incorrect = 0;
let isAnimating = false, isFlipped = false;
let currentIsCorrectMeaning = true;
let selectedLevel = "ALL", mode = "easy", streak = 0;
let timerHandle = null;
let TIME_LIMIT = 6000;

// ══════════════════════════════════════════
// DOM
// ══════════════════════════════════════════
const cardEl       = document.getElementById('card');
const kanjiEl      = document.getElementById('kanji');
const hanvietEl    = document.getElementById('han-viet');
const hardReadingEl= document.getElementById('hard-reading');
const shownMeaning = document.getElementById('shown-meaning');
const readingOn    = document.getElementById('reading-on');
const readingKun   = document.getElementById('reading-kun');
const verdictBadge = document.getElementById('verdict-badge');
const verdictHint  = document.getElementById('verdict-hint');
const meaningArea  = document.getElementById('meaning-area');
const backKanjiEl  = document.getElementById('back-kanji');
const backContent  = document.getElementById('back-content');
const progressText = document.getElementById('progress-text');
const progressBar  = document.getElementById('progress-bar');
const progressWrap = document.getElementById('progress-bar-wrap');
const timerWrap    = document.getElementById('timer-wrap');
const timerBar     = document.getElementById('timer-bar');
const sCorrect     = document.getElementById('s-correct');
const sIncorrect   = document.getElementById('s-incorrect');
const feedbackEl   = document.getElementById('feedback');
const doneScreen   = document.getElementById('done-screen');
const streakBadge  = document.getElementById('streak-badge');
const instruction  = document.getElementById('instruction');
const kanjiArea    = document.getElementById('kanji-area');

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getWrongMeaning(card) {
  const pool = ALL_KANJI.filter(c => c.kanji !== card.kanji && c.meaning !== card.meaning);
  if (!pool.length) return "không có nghĩa";
  return pool[Math.floor(Math.random() * pool.length)].meaning;
}

function playTone(freq, type = 'triangle', dur = 0.13) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

// ══════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════
function startTimer() {
  clearTimeout(timerHandle);
  timerBar.style.transition = 'none';
  timerBar.style.width = '100%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    timerBar.style.transition = `width ${TIME_LIMIT}ms linear`;
    timerBar.style.width = '0%';
  }));
  timerHandle = setTimeout(() => handleWrong(true), TIME_LIMIT);
}

function stopTimer() {
  clearTimeout(timerHandle);
  timerBar.style.transition = 'none';
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderCard() {
  const card = deck[idx];
  if (isFlipped) { cardEl.classList.remove('flipped'); isFlipped = false; }

  // randomize ONCE for both modes
  currentIsCorrectMeaning = Math.random() < 0.5;
  const displayMeaning = currentIsCorrectMeaning ? card.meaning : getWrongMeaning(card);

  kanjiEl.textContent = card.kanji;

  if (mode === 'easy') {
    hanvietEl.style.display    = 'none';
    meaningArea.classList.remove('hidden');
    hardReadingEl.style.display = 'none';
    kanjiArea.classList.remove('hard-glow');

    shownMeaning.textContent   = displayMeaning;
    readingOn.textContent      = `On: ${card.on}`;
    readingKun.textContent     = `Kun: ${card.kun}`;
    verdictBadge.style.display = 'none';
    verdictBadge.className     = '';
    verdictHint.textContent    = 'Nghĩa hiển thị là đúng hay sai?';

    progressWrap.style.display = 'block';
    timerWrap.style.display    = 'none';
    streakBadge.style.display  = 'none';
    progressBar.style.width    = `${(idx / deck.length) * 100}%`;
    progressText.textContent   = `${idx + 1} / ${deck.length}`;

  } else {
    // HARD: ẩn hán việt, hiện nghĩa + on/kun
    hanvietEl.style.display    = 'none';
    meaningArea.classList.remove('hidden');
    hardReadingEl.style.display = 'none';
    kanjiArea.classList.add('hard-glow');

    shownMeaning.textContent   = displayMeaning;
    readingOn.textContent      = `On: ${card.on}`;
    readingKun.textContent     = `Kun: ${card.kun}`;
    verdictBadge.style.display = 'none';
    verdictBadge.className     = '';
    verdictHint.textContent    = 'Nghĩa hiển thị là đúng hay sai?';

    progressWrap.style.display = 'none';
    timerWrap.style.display    = 'block';
    streakBadge.style.display  = 'block';
    streakBadge.textContent    = `🔥 ${streak}`;
    progressText.textContent   = `Streak: ${streak}`;

    startTimer();
  }

  backKanjiEl.textContent = card.kanji;
  backContent.innerHTML = `
    <strong>${card.kanji} (${card.hanviet})</strong><br>
    <span class="correct-meaning">✓ ${card.meaning}</span><br><br>
    <span style="color:#a78bfa">On: ${card.on}</span><br>
    <span style="color:#67e8f9">Kun: ${card.kun}</span><br>
    <small style="opacity:.45">Cấp độ: ${card.level}</small>
  `;

  sCorrect.textContent   = correct;
  sIncorrect.textContent = incorrect;
}

// ══════════════════════════════════════════
// ANSWER
// ══════════════════════════════════════════
function answer(userSaysCorrect) {
  if (isAnimating) return;
  isAnimating = true;
  stopTimer();

  // core logic: user's judgment vs actual
  const isRight = (userSaysCorrect === currentIsCorrectMeaning);

  if (mode === 'easy') {
    if (currentIsCorrectMeaning) {
      verdictBadge.textContent = '✓ Nghĩa này ĐÚNG';
      verdictBadge.className = 'cb';
    } else {
      verdictBadge.textContent = '✗ Nghĩa này SAI';
      verdictBadge.className = 'wb';
    }
    verdictBadge.style.display = 'inline-block';
    verdictHint.textContent = isRight ? 'Bạn nhận xét đúng! 🎯' : 'Bạn nhận xét sai 😓';
  }

  if (isRight) {
    correct++; streak++;
    playTone(660, 'triangle', 0.15);
    cardEl.classList.add('flash-correct');
    feedbackEl.textContent = '✓'; feedbackEl.style.color = 'var(--correct)';
  } else {
    incorrect++;
    playTone(220, 'sawtooth', 0.18);
    cardEl.classList.add('flash-incorrect');
    feedbackEl.textContent = '✗'; feedbackEl.style.color = 'var(--incorrect)';
  }

  feedbackEl.classList.add('show');
  setTimeout(() => feedbackEl.classList.remove('show'), 450);

  if (mode === 'hard' && !isRight) {
    setTimeout(() => {
      cardEl.classList.remove('flash-correct', 'flash-incorrect');
      handleWrong(false); isAnimating = false;
    }, 500);
  } else {
    setTimeout(() => {
      cardEl.classList.remove('flash-correct', 'flash-incorrect');
      idx++;
      if (idx >= deck.length) showDone();
      else renderCard();
      isAnimating = false;
    }, mode === 'easy' ? 600 : 400);
  }
}

// ══════════════════════════════════════════
// HARD FAIL / TIMEOUT
// ══════════════════════════════════════════
function handleWrong(isTimeout = false) {
  stopTimer(); isAnimating = false;
  const emoji = isTimeout ? '⏱' : '💥';
  const title = isTimeout ? '⏱ Hết giờ!' : '💥 Sai rồi!';
  document.getElementById('modal-emoji').textContent  = emoji;
  document.getElementById('modal-title').textContent  = title;
  document.getElementById('modal-streak').textContent = `${streak}`;
  document.getElementById('modal-detail').innerHTML =
    `Bạn đã đúng <strong style="color:#22c55e">${streak}</strong> câu liên tiếp<br>
     <small style="opacity:.6">Trên ${idx + (isTimeout?1:0)} thẻ đã qua</small>`;
  document.getElementById('modal-overlay').classList.add('visible');
}

// ══════════════════════════════════════════
// FLIP
// ══════════════════════════════════════════
function flipCard() {
  isFlipped = !isFlipped;
  cardEl.classList.toggle('flipped', isFlipped);
  playTone(440, 'sine', 0.08);
}

// ══════════════════════════════════════════
// DONE (easy)
// ══════════════════════════════════════════
function showDone() {
  const total = correct + incorrect;
  const pct = total ? Math.round((correct / total) * 100) : 0;
  document.getElementById('final-pct').textContent = `${pct}%`;
  document.getElementById('final-detail').textContent =
    `Đúng: ${correct}  ·  Sai: ${incorrect}  ·  Tổng: ${total} thẻ`;
  progressBar.style.width = '100%';
  doneScreen.classList.add('visible');
  playTone(880, 'triangle', 0.3);
}

// ══════════════════════════════════════════
// BUILD DECK
// ══════════════════════════════════════════
function buildDeck() {
  stopTimer();
  let src = selectedLevel === "ALL" ? ALL_KANJI : ALL_KANJI.filter(k => k.level === selectedLevel);
  deck = shuffle(src);
  idx = 0; correct = 0; incorrect = 0; streak = 0;
  isFlipped = false; isAnimating = false;
  doneScreen.classList.remove('visible');
  document.getElementById('modal-overlay').classList.remove('visible');
  renderCard();
}

function resetHard() {
  streak = 0; idx = 0; correct = 0; incorrect = 0;
  deck = shuffle(deck); isFlipped = false; isAnimating = false;
  document.getElementById('modal-overlay').classList.remove('visible');
  renderCard();
}

// ══════════════════════════════════════════
// MODE UI
// ══════════════════════════════════════════
function applyModeUI() {
  if (mode === 'easy') {
    instruction.className = 'easy-inst';
    instruction.textContent = '← Đúng  |  Nghĩa hiển thị là đúng hay sai?  |  Sai →';
    document.querySelector('[data-mode="easy"]').className = 'mode-btn active-easy';
    document.querySelector('[data-mode="hard"]').className = 'mode-btn';
  } else {
    instruction.className = 'hard-inst';
    instruction.textContent = '← Đúng  |  ⏱ 6 giây  |  Sai 1 câu = reset  |  Sai →';
    document.querySelector('[data-mode="easy"]').className = 'mode-btn';
    document.querySelector('[data-mode="hard"]').className = 'mode-btn active-hard';
  }
}

// ══════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.getElementById('timer-select-wrap').style.display = mode === 'hard' ? 'flex' : 'none';
    applyModeUI(); buildDeck();
  });
});
document.querySelectorAll('.timer-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active-timer'));
    btn.classList.add('active-timer');
    TIME_LIMIT = parseInt(btn.dataset.sec) * 1000;
    buildDeck();
  });
});
document.querySelectorAll('.lvl-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedLevel = btn.dataset.lvl; buildDeck();
  });
});
document.getElementById('btn-correct').addEventListener('click',   () => answer(true));
document.getElementById('btn-incorrect').addEventListener('click', () => answer(false));
document.getElementById('btn-flip').addEventListener('click', flipCard);
document.getElementById('btn-shuffle').addEventListener('click', () => {
  stopTimer(); deck = shuffle(deck); idx = 0; correct = 0; incorrect = 0; streak = 0; renderCard();
});
document.getElementById('btn-restart').addEventListener('click', buildDeck);
document.getElementById('modal-btn').addEventListener('click', () => {
  if (mode === 'hard') resetHard(); else buildDeck();
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  answer(true);
  if (e.key === 'ArrowRight') answer(false);
  if (e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); flipCard(); }
});

// ══════════════════════════════════════════
// IMPROVED TOUCH — swipe + tap-to-flip
// ══════════════════════════════════════════
let touchX = 0, touchY = 0, touchT = 0;
cardEl.addEventListener('touchstart', e => {
  touchX = e.changedTouches[0].clientX;
  touchY = e.changedTouches[0].clientY;
  touchT = Date.now();
}, { passive: true });
cardEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  const dt = Date.now() - touchT;
  const isSwipe = Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy) * 1.5;
  const isTap = Math.abs(dx) < 10 && Math.abs(dy) < 10 && dt < 300;
  if (isSwipe) answer(dx > 0);
  else if (isTap) flipCard();
}, { passive: true });

// ══════════════════════════════════════════
// DYNAMIC LAYOUT — measure bars & adjust card
// ══════════════════════════════════════════
function updateLayout() {
  const header = document.getElementById('header');
  const modebar = document.getElementById('mode-bar');
  const levelbar = document.getElementById('level-filter');
  const controls = document.getElementById('controls');
  const swipeHint = document.getElementById('swipe-hint');

  const hH = header.getBoundingClientRect().bottom;
  const mH = modebar.getBoundingClientRect().bottom;
  const lH = levelbar.getBoundingClientRect().bottom;
  const cH = controls.getBoundingClientRect().height;

  document.documentElement.style.setProperty('--header-h', hH + 'px');
  document.documentElement.style.setProperty('--modebar-bottom', mH + 'px');
  document.documentElement.style.setProperty('--levelbar-bottom', lH + 'px');
  document.documentElement.style.setProperty('--controls-h', cH + 'px');

  // Update mode-bar top dynamically
  modebar.style.top = hH + 'px';
  levelbar.style.top = mH + 'px';

  const timerWrapEl = document.getElementById('timer-wrap');
  const progressWrapEl = document.getElementById('progress-bar-wrap');
  timerWrapEl.style.top = lH + 'px';
  progressWrapEl.style.top = lH + 'px';

  const instEl = document.getElementById('instruction');
  const streakEl = document.getElementById('streak-badge');
  instEl.style.top = (lH + 10) + 'px';
  streakEl.style.top = (lH + 10) + 'px';

  if (swipeHint) swipeHint.style.bottom = (cH + 8) + 'px';
}

window.addEventListener('resize', updateLayout);
window.addEventListener('orientationchange', () => setTimeout(updateLayout, 200));

// ══════════════════════════════════════════
// HIDE SWIPE HINT after first interaction
// ══════════════════════════════════════════
let hintShown = true;
function hideHint() {
  if (!hintShown) return;
  const h = document.getElementById('swipe-hint');
  if (h) { h.style.opacity = '0'; h.style.transition = 'opacity .5s'; }
  hintShown = false;
}
cardEl.addEventListener('touchend', hideHint, { once: true });

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
applyModeUI();
buildDeck();
requestAnimationFrame(() => { updateLayout(); });
</script>
